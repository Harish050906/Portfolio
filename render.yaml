services:
  - type: web
    name: harish-portfolio-backend
    env: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONPATH
        value: /app/backend
      - key: DATABASE_URL
        fromDatabase:
          name: harish-portfolio-db
          property: connectionString
      - key: GITHUB_USERNAME
        value: Harish050906