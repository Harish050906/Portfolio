<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    
    <!-- Accent Purple-to-Cyan Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bgGrad)" stroke="url(#accentGrad)" stroke-width="12" />

  <!-- Glowing background effect for the logo -->
  <circle cx="256" cy="256" r="120" fill="#8b5cf6" opacity="0.15" filter="url(#glow)" />

  <!-- Styled Portfolio Briefcase / Folder + Terminal Logo -->
  <g transform="translate(116, 126)" stroke="url(#accentGrad)" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Folder / Briefcase Body -->
    <path d="M 20,60 L 90,60 L 120,20 L 260,20 L 260,220 A 20,20 0 0,1 240,240 L 40,240 A 20,20 0 0,1 20,220 Z" />
    
    <!-- Inner Terminal >_ Code Symbol -->
    <path d="M 80,110 L 120,130 L 80,150" stroke-width="18" />
    <line x1="140" y1="150" x2="180" y2="150" stroke-width="18" />
  </g>
</svg>
